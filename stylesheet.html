<style>
/* 
  FinTra - Finance Tracking and Analytics System
  Google Apps Script CSS Style (style.css)
*/

:root {
  --font-primary: 'DM Sans', sans-serif;
  --font-secondary: 'Inter', sans-serif;
  
  --primary: #1e40af; /* DOST Blue */
  --primary-light: #eff6ff;
  --primary-dark: #1e3a8a;
  --secondary: #0f172a; /* Slate Black */
  --bg-main: #f8fafc; /* Warm Off-White */
  --bg-card: #ffffff;
  --border: #e2e8f0;
  
  --text-main: #0f172a;
  --text-muted: #64748b;
  
  /* Status Colors */
  --success: #10b981;
  --success-bg: #ecfdf5;
  --warning: #f59e0b;
  --warning-bg: #fffbeb;
  --error: #ef4444;
  --error-bg: #fef2f2;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-primary);
  background-color: var(--bg-main);
  color: var(--text-main);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SIDEBAR STYLES */
.sidebar {
  width: 260px;
  background-color: var(--secondary);
  color: #f1f5f9;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  z-index: 100;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

.sidebar.collapsed {
  width: 72px;
}

.sidebar-header {
  padding: 24px;
  display: flex;
  align-items: center;
  position: relative;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.logo-icon {
  font-size: 24px;
  margin-right: 12px;
}

.logo-text {
  font-family: var(--font-primary);
  font-weight: 700;
  font-size: 20px;
  letter-spacing: -0.5px;
  opacity: 1;
  transition: opacity 0.2s ease;
  white-space: nowrap;
}

.sidebar.collapsed .logo-text {
  opacity: 0;
  pointer-events: none;
  width: 0;
}

.toggle-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  position: absolute;
  right: 16px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: background-color 0.2s;
}

.toggle-btn:hover {
  background-color: rgba(255, 255, 255, 0.08);
  color: #fff;
}

.sidebar.collapsed .toggle-btn {
  right: 22px;
  transform: rotate(180deg);
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  color: #94a3b8;
  text-decoration: none;
  border-radius: 8px;
  font-family: var(--font-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.nav-item i {
  width: 20px;
  height: 20px;
  margin-right: 12px;
}

.sidebar.collapsed .nav-item i {
  margin-right: 0;
}

.nav-label {
  opacity: 1;
  transition: opacity 0.2s ease;
}

.sidebar.collapsed .nav-label {
  opacity: 0;
  pointer-events: none;
  width: 0;
}

.nav-item:hover {
  color: #fff;
  background-color: rgba(255, 255, 255, 0.05);
}

.nav-item.active {
  color: #fff;
  background-color: var(--primary);
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: hidden;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background-color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  flex-shrink: 0;
}

.user-info {
  display: flex;
  flex-direction: column;
  white-space: nowrap;
}

.sidebar.collapsed .user-info {
  display: none;
}

.user-name {
  font-size: 13px;
  font-weight: 600;
}

.user-role {
  font-size: 11px;
  color: var(--text-muted);
}

/* MAIN LAYOUT */
.main-content {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}

.sidebar.collapsed + .main-content {
  margin-left: 72px;
}

/* TOP HEADER */
.top-header {
  background-color: var(--bg-card);
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 90;
}

.top-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.timestamp {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-secondary);
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background-color: var(--bg-card);
  font-family: var(--font-secondary);
  font-size: 13px;
  color: var(--text-main);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

.filter-select:hover {
  border-color: #cbd5e1;
}

.custom-date-container {
  display: flex;
  align-items: center;
  gap: 6px;
}

.date-input {
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
}

.date-sep {
  font-size: 12px;
  color: var(--text-muted);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-action {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--border);
  background-color: var(--bg-card);
  border-radius: 8px;
  font-family: var(--font-secondary);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-action:hover {
  background-color: #f8fafc;
  border-color: #cbd5e1;
}

.btn-action.icon-only {
  padding: 8px;
}

/* DROPDOWN WRAPPERS */
.dropdown-wrapper {
  position: relative;
}

.dropdown-menu {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 6px;
  background-color: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 170px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-5px);
  transition: all 0.2s;
  z-index: 120;
}

.dropdown-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.dropdown-menu a {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  color: var(--text-main);
  text-decoration: none;
  font-size: 13px;
  font-family: var(--font-secondary);
  transition: background-color 0.15s;
}

.dropdown-menu a:hover {
  background-color: var(--primary-light);
  color: var(--primary);
}

/* NOTIFICATION PANEL */
.notification-wrapper {
  position: relative;
}

.notification-badge {
  background-color: var(--error);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  top: -4px;
  right: -4px;
}

.notification-panel {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 6px;
  background-color: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-5px);
  transition: all 0.2s;
  z-index: 120;
}

.notification-panel.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.notif-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.notif-header h3 {
  font-size: 14px;
  font-weight: 700;
}

.notif-clear {
  background: none;
  border: none;
  font-size: 12px;
  color: var(--primary);
  cursor: pointer;
}

.notif-list {
  max-height: 280px;
  overflow-y: auto;
}

.notif-item {
  padding: 12px 16px;
  display: flex;
  gap: 12px;
  border-bottom: 1px solid #f1f5f9;
  transition: background-color 0.2s;
}

.notif-item:hover {
  background-color: #f8fafc;
}

.notif-bullet {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.notif-bullet.warning { background-color: var(--warning); }
.notif-bullet.success { background-color: var(--success); }
.notif-bullet.error { background-color: var(--error); }
.notif-bullet.info { background-color: var(--primary); }

.notif-body p {
  font-size: 12px;
  line-height: 1.4;
  color: var(--text-main);
}

.notif-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  display: block;
}

/* MAIN CONTENT AREA */
.content-body {
  padding: 32px;
  flex: 1;
}

.dashboard-section {
  display: none;
}

.dashboard-section.active {
  display: block;
}

/* KPI GRID */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}

.kpi-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px -2px rgba(15, 23, 42, 0.05);
  border-color: #cbd5e1;
}

.kpi-info h3 {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  font-family: var(--font-secondary);
}

.kpi-value {
  font-size: 24px;
  font-weight: 700;
  margin: 6px 0;
}

.kpi-trend {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-secondary);
}

.kpi-trend.up { color: var(--success); }
.kpi-trend.down { color: var(--error); }
.kpi-trend.neutral { color: var(--text-muted); }

.kpi-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background-color: #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}

.kpi-icon.blue {
  background-color: #eff6ff;
  color: var(--primary);
}

.kpi-icon.navy {
  background-color: #f1f5f9;
  color: var(--secondary);
}

.kpi-icon.green {
  background-color: #ecfdf5;
  color: var(--success);
}

.kpi-icon.amber {
  background-color: #fffbeb;
  color: var(--warning);
}

/* CHARTS GRID */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.chart-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.chart-card:hover {
  border-color: #cbd5e1;
  box-shadow: 0 4px 12px -2px rgba(15, 23, 42, 0.05);
}

.chart-card.full-width {
  grid-column: span 2;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.chart-header h3 {
  font-size: 15px;
  font-weight: 700;
}

.info-tooltip {
  font-size: 10px;
  font-family: var(--font-secondary);
  color: var(--primary);
  background-color: var(--primary-light);
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 500;
}

.chart-container {
  height: 240px;
  position: relative;
}

/* DATA TABLES */
.table-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.table-card-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.table-card-header h3 {
  font-size: 15px;
  font-weight: 700;
}

.table-search {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  width: 220px;
  outline: none;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-secondary);
  font-size: 13px;
  text-align: left;
}

th {
  padding: 12px 24px;
  background-color: #f8fafc;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
}

tr:last-child td {
  border-bottom: none;
}

.badge-status {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  display: inline-flex;
}

.badge-status.completed {
  background-color: var(--success-bg);
  color: var(--success);
}

.badge-status.pending {
  background-color: var(--warning-bg);
  color: var(--warning);
}

.badge-status.delayed {
  background-color: var(--error-bg);
  color: var(--error);
}

/* SETTINGS VIEW */
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.settings-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.settings-card.full-width {
  grid-column: span 2;
}

.settings-card h3 {
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 16px;
}

.profile-avatar {
  width: 52px;
  height: 52px;
  background-color: var(--primary);
  border-radius: 50%;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}

.profile-text h4 {
  font-size: 15px;
  font-weight: 700;
}

.profile-text p {
  font-size: 12px;
  color: var(--text-muted);
}

.profile-text .badge {
  font-size: 10px;
  background-color: #f1f5f9;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 4px;
  display: inline-block;
}

.profile-details {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.detail-row .label {
  color: var(--text-muted);
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 13px;
}

.status-indicator.connected {
  color: var(--success);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background-color: var(--success);
  display: inline-block;
  animation: pulse 1.5s infinite;
}

.sheet-details p {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-muted);
}

.btn-primary {
  background-color: var(--primary);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-family: var(--font-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background-color 0.15s;
}

.btn-primary:hover {
  background-color: var(--primary-dark);
}

.gas-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  gap: 4px;
}

.gas-tab {
  padding: 8px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-secondary);
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
}

.gas-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 600;
}

.code-editor-box {
  background-color: #0f172a;
  border-radius: 8px;
  padding: 20px;
  position: relative;
  font-family: 'JetBrains Mono', Courier, monospace;
}

.code-editor-box pre {
  color: #e2e8f0;
  font-size: 12px;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

.copy-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background-color: rgba(255, 255, 255, 0.1);
  color: #fff;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}

.copy-btn:hover {
  background-color: rgba(255, 255, 255, 0.2);
}

/* AI INSIGHT PANEL */
.ai-panel-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(15, 23, 42, 0.3);
  backdrop-filter: blur(4px);
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  z-index: 200;
}

.ai-panel-overlay.show {
  opacity: 1;
  visibility: visible;
}

.ai-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  height: 100vh;
  background-color: #ffffff;
  box-shadow: -10px 0 30px rgba(15, 23, 42, 0.1);
  display: flex;
  flex-direction: column;
  z-index: 210;
  transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.ai-panel.show {
  right: 0;
}

.ai-panel-header {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ai-bot-icon {
  font-size: 24px;
}

.ai-panel-header h2 {
  font-size: 18px;
  font-weight: 700;
}

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
}

.ai-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.target-visualization {
  background-color: var(--primary-light);
  border: 1px solid #dbeafe;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 20px;
}

.visualization-tag {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background-color: var(--primary);
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}

.target-visualization h3 {
  font-size: 14px;
  font-weight: 700;
  margin-top: 6px;
}

.visualization-type {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.ai-status {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 0;
  text-align: center;
  gap: 16px;
}

.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--primary-light);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.ai-status p {
  font-size: 12px;
  color: var(--text-muted);
}

.ai-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px;
  background-color: var(--error-bg);
  color: var(--error);
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
}

.ai-response-content {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.insight-block {
  border-left: 3px solid var(--primary);
  padding-left: 14px;
}

.block-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
